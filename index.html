<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YouTube Subtitle Indonesia</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:450px;
}

input,button,textarea{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

textarea{
height:200px;
background:#0f172a;
color:white;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

.copy{
background:#10b981;
}
</style>
</head>

<body>

<div class="box">

<h2>YouTube → Subtitle Indonesia</h2>

<input id="url" placeholder="Masukkan link YouTube">

<button onclick="getSubtitle()">Ambil Subtitle</button>

<textarea id="result"></textarea>

<button class="copy" onclick="copyText()">Copy Subtitle</button>

</div>

<script>

function getVideoId(url){
let reg=/(?:youtube\\.com.*v=|youtu\\.be\\/)([^&]+)/;
let match=url.match(reg);
return match?match[1]:null;
}

async function getSubtitle(){

let url=document.getElementById("url").value
let id=getVideoId(url)

if(!id){
alert("Link tidak valid")
return
}

document.getElementById("result").value="Mengambil subtitle..."

let res=await fetch("/api/subtitle?id="+id)

let data=await res.json()

if(data.subtitle){
document.getElementById("result").value=data.subtitle
}else{
document.getElementById("result").value="Subtitle tidak tersedia"
}

}

function copyText(){

let text=document.getElementById("result").value

navigator.clipboard.writeText(text)

alert("Subtitle berhasil disalin")

}

</script>

</body>
</html>
